version: 2
updates:
  # Python dependencies (uv reads the standard PEP 621 + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # GitHub Actions used by the workflows above
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
